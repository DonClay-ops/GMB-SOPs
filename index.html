const nodeById = id => WORKFLOW_NODES.find(n => n.id === id);

function WorkflowDiagram() {
  const [selected, setSelected] = useState(null);

  const renderNode = (id, laneId) => {
    if (!id) return <div style={{ minWidth:150, height:90 }} />;
    const node = nodeById(id);
    if (!node) return <div style={{ minWidth:150, height:90 }} />;
    const color = SOURCE_COLORS[node.source];
    const isSel = selected?.id === id;
    return (
      <div
        onClick={() => setSelected(node)}
        style={{
          borderRadius:8, border:`2px solid ${isSel ? color : color+"55"}`,
          padding:"12px 14px", minWidth:140, maxWidth:155, cursor:"pointer",
          transition:"all 0.15s", display:"flex", flexDirection:"column",
          alignItems:"center", textAlign:"center", gap:6, background:"white",
          boxShadow: isSel ? `0 0 0 3px ${color}44, 0 6px 16px rgba(0,0,0,0.15)` : "0 2px 6px rgba(0,0,0,0.1)",
          transform: isSel ? "translateY(-2px)" : "none", flexShrink:0,
        }}
      >
        <div style={{ width:36, height:36, borderRadius:"50%", background:color+"18", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Ic name={node.icon} size={18} color={color} />
        </div>
        <div style={{ fontSize:11, fontWeight:600, color:C.neutral100, lineHeight:1.3 }}>{node.label}</div>
        <div style={{ fontSize:10, fontWeight:500, color }}>{node.source.toUpperCase()}</div>
      </div>
    );
  };

  const ArrowSvg = ({ laneId, colIdx }) => (
    <svg width="40" height="40" viewBox="0 0 40 40" style={{ flexShrink:0 }}>
      <defs>
        <marker id={`ah-${laneId}-${colIdx}`} markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#aaa" />
        </marker>
      </defs>
      <line x1="2" y1="20" x2="32" y2="20" stroke="#bbb" strokeWidth="1.5" markerEnd={`url(#ah-${laneId}-${colIdx})`} />
    </svg>
  );

  return (
    <div style={{ display:"flex", height:"calc(100vh - 48px)", overflow:"hidden" }}>
      {/* Main canvas */}
      <div style={{ flex:1, overflowX:"auto", overflowY:"auto", background:"#f8f8fc" }}>
        {/* Legend */}
        <div style={{ display:"flex", gap:16, flexWrap:"wrap", padding:"10px 24px", background:"white", borderBottom:`1px solid ${C.border}`, alignItems:"center" }}>
          <span style={{ fontSize:12, fontWeight:600, color:C.neutral60 }}>LEGEND:</span>
          {Object.entries(SOURCE_COLORS).map(([k,v]) => (
            <div key={k} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12 }}>
              <div style={{ width:12, height:12, borderRadius:"50%", background:v }} />
              <span>{SOURCE_LABELS[k]}</span>
            </div>
          ))}
        </div>
        {/* Banner */}
        <div style={{ background:"white", borderBottom:`1px solid ${C.border}`, padding:"10px 24px", display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ fontSize:13, fontWeight:600 }}>🗺 Vendor Management Process Flow</span>
          <span style={{ fontSize:12, color:C.neutral60 }}>GBM SOP v1.1 — Click any node for details</span>
        </div>
        {/* Swimlanes */}
        <div style={{ minWidth:1350, padding:"24px 16px" }}>
          {LANES.map(lane => (
            <div key={lane.id} style={{ display:"flex", alignItems:"flex-start", minHeight:140, borderBottom:"1px dashed #ddd", marginBottom:4 }}>
              {/* Lane label */}
              <div style={{ width:110, minWidth:110, background:lane.color, color:"white", display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"8px", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", alignSelf:"stretch" }}>
                {lane.label}
              </div>
              {/* Nodes row */}
              <div style={{ flex:1, display:"flex", alignItems:"center", gap:0, padding:"20px 8px", flexWrap:"nowrap" }}>
                {LANE_NODES[lane.id].map((nodeId, i) => {
                  const nextId = LANE_NODES[lane.id][i + 1];
                  const showArrow = i < LANE_NODES[lane.id].length - 1 && nodeId && nextId;
                  const showSpacer = i < LANE_NODES[lane.id].length - 1 && (!nodeId || !nextId);
                  return (
                    <div key={i} style={{ display:"flex", alignItems:"center" }}>
                      {renderNode(nodeId, lane.id)}
                      {showArrow && <ArrowSvg laneId={lane.id} colIdx={i} />}
                      {showSpacer && <div style={{ minWidth:40 }} />}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {/* Architecture note */}
          <div style={{ margin:"20px 0 0", background:"#fff3cd", border:"1px solid #ffc107", borderRadius:6, padding:"12px 16px", fontSize:12, display:"flex", gap:10, alignItems:"flex-start" }}>
            <Ic name="alert-triangle" size={16} color="#835b00" />
            <span style={{ color:"#5f4a00" }}><strong>Architecture Constraint:</strong> Power Platform READS from SAP only. No data is written from Power Platform back to SAP. All master record creation, PO management, invoice approval, and payment processing is performed directly in SAP by GBM internal teams.</span>
          </div>
        </div>
      </div>
      {/* Side panel */}
      <div style={{ width:320, background:"white", borderLeft:`1px solid ${C.border}`, padding:20, overflowY:"auto", flexShrink:0 }}>
        {selected ? (
          <>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:32, height:32, borderRadius:"50%", background:SOURCE_COLORS[selected.source]+"18", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Ic name={selected.icon} size={16} color={SOURCE_COLORS[selected.source]} />
                </div>
                <h3 style={{ fontSize:14, fontWeight:600 }}>{selected.label}</h3>
              </div>
              <span style={{ cursor:"pointer", color:C.neutral60, fontSize:16 }} onClick={() => setSelected(null)}>✕</span>
            </div>
            <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:600, color:"white", background:SOURCE_COLORS[selected.source], marginBottom:14 }}>{SOURCE_LABELS[selected.source]}</span>
            {[["RESPONSIBLE PARTY", selected.party], ["SOP REFERENCE", selected.sop], ["INPUT SOURCE", SOURCE_LABELS[selected.source]]].map(([label, val]) => (
              <div key={label} style={{ marginBottom:10 }}>
                <div style={{ fontSize:11, textTransform:"uppercase", color:C.neutral60, fontWeight:600, marginBottom:3 }}>{label}</div>
                <div style={{ fontSize:13 }}>{val}</div>
              </div>
            ))}
            <div style={{ fontSize:11, textTransform:"uppercase", color:C.neutral60, fontWeight:600, marginBottom:4 }}>DESCRIPTION</div>
            <div style={{ fontSize:13, color:"#3b3a39", lineHeight:1.6 }}>{selected.desc}</div>
          </>
        ) : (
          <>
            <h3 style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>Process Details</h3>
            <div style={{ color:C.neutral60, fontSize:13, marginTop:24, textAlign:"center" }}>
              <Ic name="mouse-pointer" size={32} color="#bbb" />
              <p style={{ marginTop:12 }}>Click any process node to view details here.</p>
            </div>
            <div style={{ marginTop:24 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", color:C.neutral60, fontWeight:600, marginBottom:4 }}>ABOUT THIS DIAGRAM</div>
              <div style={{ fontSize:13, color:"#3b3a39", lineHeight:1.5 }}>This workflow maps all SOPs defined in the GBM Vendor Management SOP v1.1. Swimlanes represent the four primary stakeholders: Vendors, Power Platform automation, GBM Internal Teams, and SAP ERP.</div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

                    {invSteps.map((step,si)=>(
                      <React.Fragment key={si}>
                        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1 }}>
                          <div style={{ width:26, height:26, borderRadius:"50%", border:`2px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, background: si<inv.currentStep ? C.success : si===inv.currentStep ? C.accent : "white", borderColor: si<inv.currentStep ? C.success : si===inv.currentStep ? C.accent : C.border, color: si<=inv.currentStep ? "white" : C.neutral100 }}>
                            {si < inv.currentStep ? "✓" : si+1}
                          </div>
                          <div style={{ fontSize:10, color:C.neutral60, marginTop:4, textAlign:"center" }}>{step}</div>
                        </div>
                        {si < invSteps.length-1 && <div style={{ height:2, flex:1, background: si<inv.currentStep ? C.success : C.border, marginBottom:16 }} />}

                </div>

          </div>
        </div>
      )}

      {/* PROFILE */}
      {activePortalNav === "profile" && (
        <div style={{ flex:1, padding:"24px 32px" }}>
          <div style={{ background:"white", border:"1px solid #dde4ee", borderRadius:8, padding:20, maxWidth:700 }}>

              {[["Legal Name","Al Futtaim Trading Co.",true],["Vendor ID (SAP)","V-0041",true],["Primary Contact","Khalid Al Rashid",true],["Email","k.rashid@alfuttaim.ae",true],["Phone","+971 4 224 5500",false],["Country","United Arab Emirates",true],["Trade Licence","CN-1092387",true],["VAT Registration","100234567800003",true],["Bank Name","Emirates NBD",true],["IBAN","AE07033 1234 5678 9012 3456",true]].map(([label,val,ro])=>(
                <div key={label}><label style={{ display:"block", fontSize:11, color:C.neutral60, fontWeight:600, marginBottom:3 }}>{label}</label><input value={val} readOnly={ro} style={{ width:"100%", padding:"7px 10px", border:`1px solid ${C.border}`, borderRadius:4, fontSize:13, background: ro ? "#faf9f8" : "white", color:C.neutral100 }} /></div>

          </div>
        </div>
      )}

      {/* SUPPORT */}
      {activePortalNav === "support" && (
        <div style={{ flex:1, padding:"24px 32px" }}>
          <div style={{ background:"white", border:"1px solid #dde4ee", borderRadius:8, padding:20, maxWidth:600 }}>
            <h3 style={{ fontSize:14, fontWeight:600, marginBottom:16, display:"flex", alignItems:"center", gap:8 }}><Ic name="help-circle" size={16} color={C.pp}/>Vendor Support</h3>
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {[{icon:"mail",title:"Email Support",desc:"vendorsupport@gbm.net",color:C.accent},{icon:"phone",title:"Helpline (UAE)",desc:"+971 4 881 9999 · Sun–Thu 08:00–18:00 GST",color:C.gbm},{icon:"file-question",title:"FAQs & Documentation",desc:"Download the Vendor Portal User Guide",color:C.pp}].map((s,i)=>(
                <div key={i} style={{ display:"flex", gap:14, padding:14, border:`1px solid ${C.border}`, borderRadius:6, alignItems:"center", cursor:"pointer", background:"#fafafa" }}>

                  <div><div style={{ fontWeight:600, fontSize:13 }}>{s.title}</div><div style={{ fontSize:12, color:C.neutral60, marginTop:2 }}>{s.desc}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <div style={{ background:"#0a1628", color:"rgba(255,255,255,0.5)", fontSize:11, padding:"12px 32px", textAlign:"center" }}>
        Gulf Business Machines (GBM) · Vendor Portal v2.0 · Powered by Microsoft Power Pages · All data sourced from GBM SAP ERP (Read-Only) · © 2026 GBM
      </div>
    </div>

}

          <div style={{ width:30, height:30, background:C.accent, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:600, color:"white" }}>SA</div>

      </div>

      {/* Page content */}
      <div style={{ minHeight:"calc(100vh - 48px)" }}>
        {activeTab === "workflow" && <WorkflowDiagram />}

        {activeTab === "portal" && <VendorPortal />}

    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
